<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Management System</title>
    <style>
        :root { --sec: #00b894; --adm: #0984e3; --kaj: #d63031; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        #dashboard { display: none; max-width: 1300px; margin: 0 auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        #login-box { max-width: 350px; margin: 80px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 15px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .controls { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; box-sizing: border-box; }
        .stats-bar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .stat-card { flex: 1; min-width: 120px; background: #f8f9fa; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #eee; }
        .stat-card span { display: block; font-size: 18px; font-weight: bold; color: var(--adm); }
        .stat-card label { font-size: 11px; color: #777; text-transform: uppercase; }
        .table-wrap { overflow-x: auto; margin-top: 10px; border: 1px solid #eee; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 950px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; font-size: 13px; color: #666; }
        td { padding: 12px; border-bottom: 1px solid #f0f0f0; font-size: 14px; vertical-align: middle; }
        .status-cell { display: flex; flex-direction: column; line-height: 1.2; }
        .time-stamp { font-size: 10px; color: #888; margin-top: 2px; }
        .btn { border: none; padding: 8px 16px; border-radius: 4px; color: white; cursor: pointer; font-weight: 600; font-size: 13px; }
        .del-btn { color: #d63031; cursor: pointer; font-weight: bold; font-size: 18px; margin-left: 10px; }
        .del-disabled { color: #ccc; cursor: not-allowed; opacity: 0.3; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 90; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 12px; z-index: 100; width: 90%; max-width: 400px; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; align-items: end; }
    </style>
</head>
<body>

<div id="login-box">
    <h2>Bill Management</h2>
    <input type="password" id="access-pass" placeholder="Password" style="width:100%">
    <button class="btn" style="background: var(--adm); width:100%; margin-top:15px; padding:12px;" onclick="checkAccess()">Sign In</button>
</div>

<div class="overlay" id="overlay" onclick="closeAllModals()"></div>

<div id="dashboard">
    <div class="header">
        <div class="controls">
            <div id="role-display" style="padding: 6px 15px; border-radius: 4px; color: white; font-weight: bold; font-size: 12px;">Role</div>
            <input type="text" id="search-input" placeholder="Search Party..." onkeyup="refreshTable()">
            <div style="display: flex; gap: 15px; font-size: 20px; cursor: pointer;">
                <span onclick="toggleView('month-view')">📅</span>
                <span id="log-trigger" style="display: none;" onclick="toggleView('log-view')">📜</span>
                <span onclick="toggleView('settings-view')">⚙️</span>
            </div>
        </div>
        <button class="btn" style="background: #444;" onclick="location.reload()">Logout</button>
    </div>

    <div class="stats-bar">
        <div class="stat-card"><span id="stat-total">0</span><label>Total</label></div>
        <div class="stat-card"><span id="stat-accepted" style="color:var(--adm)">0</span><label>Accepted</label></div>
        <div class="stat-card"><span id="stat-pending" style="color:#f08c00">0</span><label>Pending</label></div>
        <div class="stat-card"><span id="stat-received" style="color:#00b894">0</span><label>Received</label></div>
    </div>

    <div id="settings-view" class="modal">
        <h3>Settings</h3>
        <button class="btn" style="background: #27ae60; width: 100%; margin-bottom: 20px;" onclick="exportToExcel()">📊 Export to Excel</button>
        <p>Change Password:</p>
        <input type="password" id="new-pw" placeholder="New Password" style="width: 100%; margin-bottom: 10px;">
        <button class="btn" style="background: var(--adm); width: 100%;" onclick="saveNewPassword()">Update</button>
    </div>

    <div id="month-view" class="modal">
        <h3>Filter Month</h3>
        <select id="filter-month" style="width: 100%; margin-bottom: 15px;">
            <option value="all">All Months</option>
            <option value="0">Jan</option><option value="1">Feb</option><option value="2">Mar</option>
            <option value="3">Apr</option><option value="4">May</option><option value="5">Jun</option>
            <option value="6">Jul</option><option value="7">Aug</option><option value="8">Sep</option>
            <option value="9">Oct</option><option value="10">Nov</option><option value="11">Dec</option>
        </select>
        <button class="btn" style="background: var(--adm); width: 100%;" onclick="applyMonthlyFilter()">Apply</button>
    </div>

    <div id="log-view" class="modal" style="max-width: 600px;">
        <h3>Audit Logs</h3>
        <div id="log-list" style="max-height: 300px; overflow-y: auto; font-size: 12px;"></div>
    </div>

    <div id="security-form" style="display:none;">
        <div class="form-row">
            <div><label>Bill Date</label><input type="date" id="b_date" style="width:100%"></div>
            <div><label>Party Name</label><input type="text" id="party" oninput="autoCap(this)" style="width:100%"></div>
            <div><label>Bill No</label><input type="text" id="b_no" style="width:100%"></div>
            <div><label>Qty</label><input type="number" id="qty" style="width:100%"></div>
            <div><label>Amount</label><input type="number" id="amt" style="width:100%"></div>
            <button class="btn" style="background: var(--sec); height: 40px;" onclick="addBill()">Submit</button>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead><tr><th>Inward Date</th><th>Bill Date</th><th>Party Name</th><th>Bill No</th><th>Qty</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="bill-list"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, update, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://inward-e8f44-default-rtdb.firebaseio.com/", projectId: "inward-e8f44" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const billsRef = ref(db, 'bills');
    const configRef = ref(db, 'config');

    let config = {}, bills = [], currentRole = '', activeMonth = 'all';

    onValue(configRef, s => config = s.val() || { 'user': 'security', 'verify#99': 'admin', '123': 'kajal' });
    onValue(billsRef, s => { const d = s.val(); bills = d ? Object.keys(d).map(k => ({ ...d[k], id: k })) : []; refreshTable(); });

    const getStamp = () => {
        const d = new Date();
        return `${currentRole} @ ${d.getDate()}/${d.getMonth()+1} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    };

    window.checkAccess = () => {
        const p = document.getElementById('access-pass').value;
        if(config[p]) {
            currentRole = config[p];
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('role-display').innerText = currentRole.toUpperCase();
            document.getElementById('role-display').style.background = currentRole === 'security' ? 'var(--sec)' : (currentRole === 'admin' ? 'var(--adm)' : 'var(--kaj)');
            if(currentRole === 'security') document.getElementById('security-form').style.display = 'block';
            if(currentRole === 'admin') document.getElementById('log-trigger').style.display = 'inline-block';
            refreshTable();
        } else alert("Denied");
    };

    window.addBill = () => {
        const bD = document.getElementById('b_date').value;
        const party = document.getElementById('party').value;
        const no = document.getElementById('b_no').value;
        if(!party || !bD) return alert("Fields Required");

        if(bills.some(b => b.party.toLowerCase() === party.toLowerCase() && b.no === no)) return alert("Duplicate Entry!");

        push(billsRef, { 
            status: 'Pending', 
            inDate: new Date().toLocaleDateString(), // Auto-captured Inward Date
            bD, party, no,
            qty: document.getElementById('qty').value, amt: document.getElementById('amt').value,
            stamp: getStamp(),
            createdAt: Date.now()
        });
        ['b_date','party','b_no','qty','amt'].forEach(id => document.getElementById(id).value = '');
    };

    window.updateStatus = (id, s) => {
        update(ref(db, `bills/${id}`), { status: s, stamp: getStamp() });
    };

    window.deleteBill = (id) => {
        if(confirm("Delete entry?")) remove(ref(db, `bills/${id}`));
    };

    window.exportToExcel = () => {
        let csv = "Inward Date,Bill Date,Party,Bill No,Qty,Amount,Status,Last Update\n";
        bills.forEach(b => csv += `${b.inDate},${b.bD},${b.party},${b.no},${b.qty},${b.amt},${b.status},${b.stamp}\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = window.URL.createObjectURL(blob);
        a.download = `Inward_Report_${new Date().toLocaleDateString()}.csv`;
        a.click();
    };

    window.refreshTable = () => {
        const list = document.getElementById('bill-list');
        const search = document.getElementById('search-input').value.toLowerCase();
        document.getElementById('stat-total').innerText = bills.length;
        document.getElementById('stat-accepted').innerText = bills.filter(x => x.status === 'Accepted').length;
        document.getElementById('stat-pending').innerText = bills.filter(x => x.status === 'Pending').length;
        document.getElementById('stat-received').innerText = bills.filter(x => x.status === 'Received').length;

        list.innerHTML = '';
        bills.filter(b => {
            const d = new Date(b.bD);
            return (activeMonth === 'all' || d.getMonth().toString() === activeMonth) &&
                   (b.party.toLowerCase().includes(search) || b.no.toLowerCase().includes(search));
        }).sort((a,b) => b.createdAt - a.createdAt).forEach(b => {
            let actHtml = '--';
            if(b.status === 'Pending' && currentRole === 'admin') 
                actHtml = `<button class="btn" style="background:var(--adm)" onclick="updateStatus('${b.id}','Accepted')">Accept</button>`;
            else if(b.status === 'Accepted' && currentRole === 'kajal') 
                actHtml = `<button class="btn" style="background:var(--kaj)" onclick="updateStatus('${b.id}','Received')">Receive</button>`;
            else if(b.status === 'Received') actHtml = '✅ Done';

            const isRec = b.status === 'Received';
            const delMark = (currentRole === 'admin') ? 
                `<span class="del-btn ${isRec ? 'del-disabled' : ''}" ${!isRec ? `onclick="deleteBill('${b.id}')"` : ''}>✖</span>` : '';

            list.innerHTML += `<tr>
                <td style="color:#666; font-size:12px;">${b.inDate || '-'}</td>
                <td>${b.bD}</td>
                <td><strong>${b.party}</strong></td>
                <td>${b.no}</td>
                <td>${b.qty}</td>
                <td>₹${b.amt}</td>
                <td>
                    <div class="status-cell">
                        <b>${b.status}</b>
                        <span class="time-stamp">${b.stamp || ''}</span>
                    </div>
                </td>
                <td>${actHtml} ${delMark}</td>
            </tr>`;
        });
    };

    window.saveNewPassword = () => {
        const newPass = document.getElementById('new-pw').value;
        const oldKey = Object.keys(config).find(k => config[k] === currentRole);
        let nC = { ...config }; delete nC[oldKey]; nC[newPass] = currentRole;
        set(configRef, nC).then(() => location.reload());
    };

    window.toggleView = (id) => { 
        document.getElementById('overlay').style.display = 'block';
        document.getElementById(id).style.display = 'block'; 
        if(id === 'log-view') {
            const l = document.getElementById('log-list'); l.innerHTML = '';
            bills.forEach(b => l.innerHTML = `<p style="border-bottom:1px solid #eee; padding:5px;"><b>${b.party}:</b> ${b.status} (${b.stamp})</p>` + l.innerHTML);
        }
    };
    window.closeAllModals = () => { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); document.getElementById('overlay').style.display = 'none'; };
    window.applyMonthlyFilter = () => { activeMonth = document.getElementById('filter-month').value; refreshTable(); closeAllModals(); };
    window.autoCap = (el) => { el.value = el.value.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' '); };
</script>
</body>
</html>
